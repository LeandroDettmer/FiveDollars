name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag do release (ex.: v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  NODE_VERSION: '20'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: macos
          - platform: ubuntu-latest
            name: linux
          - platform: windows-latest
            name: windows
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || (github.event_name == 'workflow_dispatch' && inputs.tag_name) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Prepare signing key
        shell: bash
        run: |
          set -e
          KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          if [ -z "$KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY não definido, build seguirá sem assinatura."
            exit 0
          fi
          # Remove espaços e quebras de linha que podem ter entrado ao colar o secret
          echo "$KEY" | tr -d ' \n\r\t' | base64 -d > "$RUNNER_TEMP/tauri_signing.key"
          if ! [ -s "$RUNNER_TEMP/tauri_signing.key" ]; then
            echo "::error::Chave decodificada vazia. Secret deve ser o base64 do arquivo .key: base64 -w 0 < ~/.tauri/SUA_CHAVE.key (ou base64 < arquivo | tr -d '\\n')"
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY=$RUNNER_TEMP/tauri_signing.key" >> $GITHUB_ENV

      - name: Build Tauri
        run: npm run tauri build
        env:
          CARGO_TERM_COLOR: always
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifact (macOS)
        if: matrix.name == 'macos'
        shell: bash
        run: |
          mkdir -p release-artifact
          DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "::error::DMG não encontrado"
            ls -la src-tauri/target/release/bundle/dmg/ 2>/dev/null || true
            exit 1
          fi
          cp "$DMG" release-artifact/FiveDollars-macos.dmg
          for f in src-tauri/target/release/bundle/macos/*.app.tar.gz; do
            if [ -f "$f" ]; then
              cp "$f" release-artifact/FiveDollars.app.tar.gz
              [ -f "${f}.sig" ] && cp "${f}.sig" release-artifact/FiveDollars.app.tar.gz.sig
              break
            fi
          done

      - name: Upload artifact (Linux)
        if: matrix.name == 'linux'
        run: |
          mkdir -p release-artifact
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            [ -f "$f" ] && cp "$f" release-artifact/FiveDollars-linux.AppImage && cp "${f}.sig" release-artifact/FiveDollars-linux.AppImage.sig 2>/dev/null; break
          done
          cp src-tauri/target/release/bundle/deb/*.deb release-artifact/ 2>/dev/null || true
          if [ -z "$(ls -A release-artifact 2>/dev/null)" ]; then
            echo "::error::Nenhum artefato Linux (AppImage/deb)"
            exit 1
          fi

      - name: Upload artifact (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifact | Out-Null
          $bundle = "src-tauri/target/release/bundle"
          $msi = Get-ChildItem -Path "$bundle/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          $exe = Get-ChildItem -Path "$bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName release-artifact/FiveDollars-windows.msi
            $sig = "$($msi.FullName).sig"
            if (Test-Path $sig) { Copy-Item $sig release-artifact/FiveDollars-windows.msi.sig }
          }
          if ($exe) {
            Copy-Item $exe.FullName release-artifact/FiveDollars-windows.exe
            $sig = "$($exe.FullName).sig"
            if (Test-Path $sig) { Copy-Item $sig release-artifact/FiveDollars-windows.exe.sig }
          }
          if ((Get-ChildItem release-artifact).Count -eq 0) { throw "Nenhum artefato Windows encontrado" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: release-artifact/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Gather assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          if [ -z "$(ls -A release-assets 2>/dev/null)" ]; then
            echo "::error::Nenhum artefato baixado"
            exit 1
          fi

      - name: Create latest.json
        env:
          TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          PLATFORMS="{}"
          if [ -f release-assets/FiveDollars.app.tar.gz ] && [ -f release-assets/FiveDollars.app.tar.gz.sig ]; then
            SIG=$(tr -d '\n' < release-assets/FiveDollars.app.tar.gz.sig)
            PLATFORMS=$(echo "$PLATFORMS" | jq -c --arg url "${BASE}/FiveDollars.app.tar.gz" --arg sig "$SIG" '. + {"darwin-aarch64": {"url": $url, "signature": $sig}}')
          fi
          if [ -f release-assets/FiveDollars-linux.AppImage ] && [ -f release-assets/FiveDollars-linux.AppImage.sig ]; then
            SIG=$(tr -d '\n' < release-assets/FiveDollars-linux.AppImage.sig)
            PLATFORMS=$(echo "$PLATFORMS" | jq -c --arg url "${BASE}/FiveDollars-linux.AppImage" --arg sig "$SIG" '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
          fi
          if [ -f release-assets/FiveDollars-windows.exe ] && [ -f release-assets/FiveDollars-windows.exe.sig ]; then
            SIG=$(tr -d '\n' < release-assets/FiveDollars-windows.exe.sig)
            PLATFORMS=$(echo "$PLATFORMS" | jq -c --arg url "${BASE}/FiveDollars-windows.exe" --arg sig "$SIG" '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')
          fi
          jq -n --arg version "$VERSION" --argjson platforms "$PLATFORMS" '{version: $version, platforms: $platforms}' > release-assets/latest.json

      - name: List release files
        id: paths
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          find release-assets -type f >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.paths.outputs.files }}
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publica latest.json na raiz do repo para o app poder buscar sem redirect (releases/latest/download retorna 302)
      - name: Publish latest.json to repo (raw URL)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="${{ github.event.repository.default_branch }}"
          git fetch origin "$branch"
          git checkout "$branch"
          cp release-assets/latest.json ./latest.json
          git add latest.json
          git diff --staged --quiet && echo "latest.json sem alteração" || (git commit -m "chore: update latest.json for updater endpoint" && git push origin "$branch")
