name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag do release (ex.: v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: macos
          - platform: ubuntu-latest
            name: linux
          - platform: windows-latest
            name: windows
    runs-on: ${{ matrix.platform }}
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || (github.event_name == 'workflow_dispatch' && inputs.tag_name) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Linux dependencies (Tauri)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build
        env:
          CARGO_TERM_COLOR: always
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          
      - name: Prepare and upload artifact (macOS)
        if: matrix.name == 'macos'
        run: |
          echo "Procurando .dmg em src-tauri/target..."
          find src-tauri/target -name "*.dmg" -type f 2>/dev/null || true
          DMG=$(find src-tauri/target -name "*.dmg" -type f 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "DMG não encontrado. Conteúdo de src-tauri/target/release/bundle:"
            ls -la src-tauri/target/release/bundle/ 2>/dev/null || true
            ls -la src-tauri/target/release/bundle/dmg/ 2>/dev/null || true
            exit 1
          fi
          echo "Encontrado: $DMG"
          mkdir -p release-artifact
          cp "$DMG" release-artifact/FiveDollars-macos.dmg
          # Artefatos do updater (tar.gz + assinatura)
          for f in src-tauri/target/release/bundle/macos/*.app.tar.gz; do
            [ -f "$f" ] && cp "$f" release-artifact/ && cp "${f}.sig" release-artifact/ 2>/dev/null || true && break
          done

      - name: Prepare and upload artifact (Linux)
        if: matrix.name == 'linux'
        run: |
          mkdir -p release-artifact
          if ls src-tauri/target/release/bundle/appimage/*.AppImage 1>/dev/null 2>&1; then
            cp src-tauri/target/release/bundle/appimage/*.AppImage release-artifact/FiveDollars-linux.AppImage
            SIG="$(find src-tauri/target/release/bundle/appimage -name '*.AppImage.sig' -type f 2>/dev/null | head -1)"
            if [ -n "$SIG" ]; then cp "$SIG" release-artifact/FiveDollars-linux.AppImage.sig; fi
          fi
          if ls src-tauri/target/release/bundle/deb/*.deb 1>/dev/null 2>&1; then
            cp src-tauri/target/release/bundle/deb/*.deb release-artifact/
          fi
          if [ -z "$(ls -A release-artifact 2>/dev/null)" ]; then
            echo "Nenhum artefato Linux encontrado"
            exit 1
          fi

      - name: Prepare and upload artifact (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifact
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName release-artifact/FiveDollars-windows.msi
            $sig = Join-Path (Split-Path $msi.FullName) ($msi.Name + ".sig")
            if (Test-Path $sig) { Copy-Item $sig release-artifact/FiveDollars-windows.msi.sig }
          }
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName release-artifact/FiveDollars-windows.exe
            $sig = Join-Path (Split-Path $exe.FullName) ($exe.Name + ".sig")
            if (Test-Path $sig) { Copy-Item $sig release-artifact/FiveDollars-windows.exe.sig }
          }
          if ((Get-ChildItem release-artifact).Count -eq 0) { throw "Nenhum artefato Windows encontrado" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: release-artifact/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Gather release assets
        id: gather
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/
          if [ -z "$(ls -A release-assets 2>/dev/null)" ]; then
            echo "Nenhum artefato para anexar ao release"
            exit 1
          fi

      - name: Create latest.json for updater
        id: latest_json
        env:
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
        run: |
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          BASE="https://github.com/LeandroDettmer/FiveDollars/releases/download/${TAG}"
          PLATFORMS="{}"
          if [ -f release-assets/FiveDollars.app.tar.gz ] && [ -f release-assets/FiveDollars.app.tar.gz.sig ]; then
            SIG=$(cat release-assets/FiveDollars.app.tar.gz.sig | tr -d '\n')
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE}/FiveDollars.app.tar.gz" --arg sig "$SIG" '. + {"darwin-x86_64": {"url": $url, "signature": $sig}}')
          fi
          if [ -f release-assets/FiveDollars-linux.AppImage ] && [ -f release-assets/FiveDollars-linux.AppImage.sig ]; then
            SIG=$(cat release-assets/FiveDollars-linux.AppImage.sig | tr -d '\n')
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE}/FiveDollars-linux.AppImage" --arg sig "$SIG" '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
          fi
          if [ -f release-assets/FiveDollars-windows.exe ] && [ -f release-assets/FiveDollars-windows.exe.sig ]; then
            SIG=$(cat release-assets/FiveDollars-windows.exe.sig | tr -d '\n')
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE}/FiveDollars-windows.exe" --arg sig "$SIG" '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')
          fi
          echo "{\"version\": \"$VERSION\", \"platforms\": $PLATFORMS}" | jq . > release-assets/latest.json
          cat release-assets/latest.json

      - name: Set release asset paths
        id: paths
        run: |
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          find release-assets -type f >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.paths.outputs.paths }}
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
